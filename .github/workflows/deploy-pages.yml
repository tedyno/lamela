name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. Do not cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Automatically enable GitHub Pages for the repo if it isn't yet
          enablement: true

      - name: Vendor Three.js locally (self-hosted, no runtime CDN)
        run: |
          mkdir -p vendor
          curl -fsSL -o vendor/three.min.js \
            https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js
          # sanity check: file is non-trivial JS, not an error page
          test "$(wc -c < vendor/three.min.js)" -gt 100000

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the repository root (contains index.html)
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
